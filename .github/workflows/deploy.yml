name: Generate model.archimate from Koppelregister

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install openpyxl lxml pandas

      # ── Generate model.archimate ───────────────────────────────────────
      - name: Generate model.archimate
        run: |
          if [ -f "Koppelregister_v1.xlsx" ] && [ -s "Koppelregister_v1.xlsx" ]; then
            echo "Using Koppelregister_v1.xlsx"
            python scripts/generate_model_koppelregister.py
          else
            echo "Koppelregister not found or empty — using model-input.xlsx"
            python scripts/generate_model.py
          fi

      # ── Also generate HTML viewer as fallback (deployed to Pages) ─────
      - name: Generate HTML viewer
        run: python scripts/generate_html.py

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # ── Commit model.archimate so Archi users can download it ─────────
      - name: Commit model.archimate
        continue-on-error: true
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add model.archimate
          if git diff --staged --quiet; then
            echo "model.archimate unchanged."
          else
            git commit -m "chore: regenerate model.archimate [skip ci]"
            git restore . 2>/dev/null || git checkout -- .
            git pull --rebase origin main
            git push
          fi
