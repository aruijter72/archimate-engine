name: Generate ArchiMate Artefacts & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install openpyxl lxml pandas

      # Use Koppelregister when present, fall back to model-input.xlsx
      - name: Generate model.archimate
        run: |
          if [ -f "Koppelregister_v1.xlsx" ]; then
            echo "Using Koppelregister_v1.xlsx"
            python scripts/generate_model_koppelregister.py
          else
            echo "Using model-input.xlsx"
            python scripts/generate_model.py
          fi

      - name: Generate HTML viewer
        run: python scripts/generate_html.py

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
